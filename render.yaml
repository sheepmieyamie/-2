# Render 一键部署（前后端一体，推荐）
# 使用方式：Render 控制台 → New → Blueprint → 连接本仓库
services:
  - type: web
    name: xhs-content-library
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: TIKHUB_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_WIRE_API
        value: responses
      - key: OPENAI_REASONING_EFFORT
        value: high
