<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>管理员后台</title>
  <style>
    :root {
      --bg: #f4f6f9; --surface: #fff; --border: #e4e8ef;
      --text: #1a1a1a; --muted: #6b7280; --primary: #ff2442; --ok: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #1e293b, #334155); }
    .login-card { background: var(--surface); border-radius: 14px; padding: 32px 28px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
    .login-card h1 { font-size: 1.2rem; margin-bottom: 8px; }
    .login-card p { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .login-card input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; margin-bottom: 12px; }
    .login-card .error { color: #b91c1c; font-size: 0.82rem; min-height: 1.2em; margin-bottom: 8px; }
    .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 0.84rem; cursor: pointer; background: var(--primary); color: #fff; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-block { width: 100%; padding: 12px; font-size: 0.95rem; }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.5); color: #fff; }
    .btn-link { background: none; border: none; color: var(--primary); padding: 0; font-size: 0.86rem; cursor: pointer; }
    .app-shell { display: none; }
    .app-shell.visible { display: block; }
    .header { background: linear-gradient(135deg, #1e293b, #334155); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .header h1 { font-size: 1.15rem; }
    .header p { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .status-pill { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.15); }
    .status-pill.ok { background: rgba(22,163,74,0.25); }
    .status-pill.err { background: rgba(220,38,38,0.3); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 20px 24px 40px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .stat-card .label { font-size: 0.75rem; color: var(--muted); }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab { padding: 12px 18px; font-size: 0.86rem; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .breadcrumb { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .breadcrumb strong { font-size: 0.92rem; }
    .breadcrumb span { font-size: 0.8rem; color: var(--muted); }
    .panel-body { display: grid; grid-template-columns: 1fr 1fr; min-height: 420px; }
    @media (max-width: 900px) { .panel-body { grid-template-columns: 1fr; } }
    .list-pane { border-right: 1px solid var(--border); overflow-y: auto; max-height: 520px; }
    .detail-pane { overflow-y: auto; max-height: 520px; padding: 16px; }
    .list-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .list-item:hover { background: #f8fafc; }
    .list-item.active { background: #fff5f6; border-left: 3px solid var(--primary); }
    .list-item strong { display: block; font-size: 0.88rem; margin-bottom: 4px; }
    .list-item span { font-size: 0.75rem; color: var(--muted); }
    .empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.88rem; }
    .detail-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
    .detail-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
    .detail-block { margin-bottom: 16px; }
    .detail-block h3 { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    pre { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 0.78rem; line-height: 1.5; overflow: auto; max-height: 320px; white-space: pre-wrap; word-break: break-word; }
    .msg { margin-bottom: 10px; padding: 10px 12px; border-radius: 8px; font-size: 0.82rem; line-height: 1.5; }
    .msg.user { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .msg.assistant { background: #f0fdf4; border-left: 3px solid var(--ok); }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: #f1f5f9; border-radius: 12px; padding: 2px 8px; font-size: 0.72rem; color: #475569; }
    .note-row { padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 0.82rem; }
    .toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
    .panel-body.analytics-mode .list-pane { display: none; }
    .panel-body.analytics-mode .detail-pane { grid-column: 1 / -1; max-height: none; }
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .metric-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .metric-box .label { font-size: 0.75rem; color: var(--muted); }
    .metric-box .value { font-size: 1.25rem; font-weight: 700; margin-top: 4px; }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    table.data-table th, table.data-table td { border-bottom: 1px solid var(--border); padding: 8px 6px; text-align: left; }
    table.data-table th { color: var(--muted); font-weight: 500; }
    .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.86rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>管理员登录</h1>
      <p>此页面仅供管理员使用。请输入服务端配置的 ADMIN_TOKEN。</p>
      <input type="password" id="tokenInput" placeholder="管理员口令" autocomplete="current-password" />
      <p class="error" id="loginError"></p>
      <button class="btn btn-block" type="button" id="loginBtn">进入后台</button>
    </div>
  </div>

  <div class="app-shell" id="appShell">
    <header class="header">
      <div>
        <h1>管理员后台</h1>
        <p>以客户为单位查看使用数据与内容库</p>
      </div>
      <div class="header-actions">
        <span class="status-pill" id="healthPill">检测中…</span>
        <button class="btn btn-ghost" type="button" id="refreshBtn">刷新</button>
        <button class="btn btn-ghost" type="button" id="logoutBtn">退出</button>
        <a href="/" class="btn btn-ghost" style="text-decoration:none;display:inline-block">返回前台</a>
      </div>
    </header>

    <div class="wrap">
      <div id="errorBanner" class="error-banner" hidden></div>
      <div class="stats" id="stats"></div>

      <div class="panel" id="mainPanel">
        <div class="tabs" id="mainTabs">
          <button class="tab active" data-tab="analytics">使用概览</button>
          <button class="tab" data-tab="customers">客户列表</button>
          <button class="tab" data-tab="words">违禁词库</button>
        </div>
        <div class="toolbar" id="toolbar">全站使用趋势与行为统计</div>
        <div class="panel-body" id="panelBody">
          <div class="list-pane" id="listPane"><div class="empty">加载中…</div></div>
          <div class="detail-pane" id="detailPane"><div class="empty">选择一条记录查看详情</div></div>
        </div>
      </div>

      <div class="panel hidden" id="customerPanel">
        <div class="breadcrumb">
          <button class="btn-link" type="button" id="backToCustomers">← 返回客户列表</button>
          <strong id="customerTitle">客户</strong>
          <span id="customerMeta"></span>
        </div>
        <div class="tabs" id="customerTabs">
          <button class="tab active" data-tab="accounts">对标账号</button>
          <button class="tab" data-tab="sessions">对话记录</button>
          <button class="tab" data-tab="refposts">参考帖</button>
          <button class="tab" data-tab="presets">产品档案</button>
          <button class="tab" data-tab="activity">最近行为</button>
        </div>
        <div class="toolbar" id="customerToolbar">该客户创建/使用的数据</div>
        <div class="panel-body" id="customerPanelBody">
          <div class="list-pane" id="customerListPane"><div class="empty">加载中…</div></div>
          <div class="detail-pane" id="customerDetailPane"><div class="empty">选择一条记录查看详情</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "/api/admin";
    const TOKEN_KEY = "xhs_admin_token";
    let mainTab = "analytics";
    let customerTab = "accounts";
    let customers = [];
    let customerData = null;
    let selectedCustomerId = null;
    let selectedItemId = null;
    let wordsCache = null;

    const $ = (id) => document.getElementById(id);

    function getToken() { return sessionStorage.getItem(TOKEN_KEY) || ""; }
    function setToken(token) {
      if (token) sessionStorage.setItem(TOKEN_KEY, token);
      else sessionStorage.removeItem(TOKEN_KEY);
    }

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function fmtTime(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function showLogin(msg) {
      $("loginScreen").style.display = "flex";
      $("appShell").classList.remove("visible");
      if (msg) $("loginError").textContent = msg;
    }

    function showApp() {
      $("loginScreen").style.display = "none";
      $("appShell").classList.add("visible");
      $("loginError").textContent = "";
    }

    function showError(msg) {
      const el = $("errorBanner");
      if (!msg) { el.hidden = true; return; }
      el.textContent = msg;
      el.hidden = false;
    }

    async function api(path) {
      const res = await fetch(`${API}${path}`, { headers: { "X-Admin-Token": getToken() } });
      const data = await res.json().catch(() => ({}));
      if (res.status === 401) {
        setToken("");
        showLogin("口令已失效，请重新登录");
        throw new Error("未授权");
      }
      if (!res.ok) {
        const msg = typeof data.detail === "string" ? data.detail : `请求失败 ${res.status}`;
        throw new Error(msg);
      }
      return data;
    }

    function renderStatsCards(s) {
      $("stats").innerHTML = [
        ["客户总数", s.customers],
        ["活跃客户", s.active_customers],
        ["对标账号", s.accounts],
        ["对话会话", s.chat_sessions],
        ["参考帖", s.reference_posts],
        ["消息条数", s.chat_messages],
        ["违禁词", s.forbidden_words],
        ["限流词", s.limit_words],
      ].map(([label, value]) => `
        <div class="stat-card"><div class="label">${label}</div><div class="value">${value ?? "—"}</div></div>
      `).join("");
    }

    async function loadHealth() {
      try {
        await fetch("/api/health");
        $("healthPill").textContent = "服务正常";
        $("healthPill").className = "status-pill ok";
      } catch {
        $("healthPill").textContent = "服务异常";
        $("healthPill").className = "status-pill err";
      }
    }

    async function loadStats() {
      renderStatsCards(await api("/stats"));
    }

    async function loadAnalytics() {
      $("panelBody").classList.add("analytics-mode");
      $("detailPane").innerHTML = '<div class="empty">加载使用数据…</div>';
      const a = await api("/analytics?days=30");
      const s = a.summary;
      $("detailPane").innerHTML = `
        <div class="detail-title">全站使用概览（近 ${a.period_days} 天）</div>
        <div class="metric-grid">
          <div class="metric-box"><div class="label">独立访客（7天）</div><div class="value">${s.unique_visitors_7d}</div></div>
          <div class="metric-box"><div class="label">独立访客（30天）</div><div class="value">${s.unique_visitors_30d}</div></div>
          <div class="metric-box"><div class="label">页面访问（7天）</div><div class="value">${s.page_views_7d}</div></div>
          <div class="metric-box"><div class="label">AI 对话（7天）</div><div class="value">${s.chat_messages_7d}</div></div>
          <div class="metric-box"><div class="label">抓取账号成功</div><div class="value">${s.account_scrapes_ok}</div></div>
          <div class="metric-box"><div class="label">抓取参考帖</div><div class="value">${s.ref_post_scrapes}</div></div>
        </div>
        <div class="detail-block">
          <h3>每日趋势</h3>
          <table class="data-table">
            <thead><tr><th>日期</th><th>页面访问</th><th>独立访客</th><th>AI 对话</th><th>抓取账号</th></tr></thead>
            <tbody>${(a.daily || []).map(d => `<tr><td>${d.date}</td><td>${d.page_views}</td><td>${d.unique_visitors}</td><td>${d.chats}</td><td>${d.account_scrapes}</td></tr>`).join("") || '<tr><td colspan="5">暂无</td></tr>'}</tbody>
          </table>
        </div>`;
    }

    function renderCustomerList() {
      $("panelBody").classList.remove("analytics-mode");
      const pane = $("listPane");
      if (!customers.length) {
        pane.innerHTML = '<div class="empty">暂无客户数据</div>';
        return;
      }
      pane.innerHTML = customers.map(c => `
        <div class="list-item" data-id="${escapeHtml(c.client_id)}">
          <strong>${escapeHtml(c.display_id)}</strong>
          <span>访问 ${c.page_views || 0} · 账号 ${c.accounts_count} · 对话 ${c.sessions_count} · 参考帖 ${c.ref_posts_count} · 档案 ${c.presets_count}</span>
          <span>最近活跃 ${fmtTime(c.last_active)}</span>
        </div>
      `).join("");
      pane.querySelectorAll(".list-item").forEach(item => {
        item.onclick = () => openCustomer(item.dataset.id);
      });
    }

    function renderWords() {
      $("panelBody").classList.remove("analytics-mode");
      const w = wordsCache;
      $("listPane").innerHTML = `<div class="list-item active"><strong>违禁词 ${(w.forbidden || []).length} 个</strong><span>限流词 ${Object.keys(w.limit || {}).length} 个</span></div>`;
      $("detailPane").innerHTML = `
        <div class="detail-title">违禁词 / 限流词库</div>
        <div class="detail-block"><h3>违禁词</h3><pre>${escapeHtml((w.forbidden || []).join("\n"))}</pre></div>
        <div class="detail-block"><h3>限流词替换表</h3><pre>${escapeHtml(JSON.stringify(w.limit || {}, null, 2))}</pre></div>`;
    }

    async function loadMainTab() {
      $("mainPanel").classList.remove("hidden");
      $("customerPanel").classList.add("hidden");
      $("detailPane").innerHTML = '<div class="empty">选择一条记录查看详情</div>';
      $("listPane").innerHTML = '<div class="empty">加载中…</div>';
      $("toolbar").textContent = mainTab === "analytics" ? "全站使用趋势与行为统计" : mainTab === "customers" ? "点击客户进入其数据页面" : "全站违禁词配置";
      if (mainTab === "analytics") {
        await loadAnalytics();
        return;
      }
      if (mainTab === "customers") {
        customers = await api("/customers");
        renderCustomerList();
        $("detailPane").innerHTML = '<div class="empty">点击左侧客户查看其对标账号、对话等数据</div>';
        return;
      }
      wordsCache = await api("/forbidden-words");
      renderWords();
    }

    async function openCustomer(clientId) {
      selectedCustomerId = clientId;
      customerTab = "accounts";
      selectedItemId = null;
      customerData = await api(`/customers/${encodeURIComponent(clientId)}`);
      $("mainPanel").classList.add("hidden");
      $("customerPanel").classList.remove("hidden");
      $("customerTitle").textContent = customerData.display_id;
      $("customerMeta").textContent = `ID: ${customerData.client_id} · 最近活跃 ${fmtTime(customerData.last_active)}`;
      document.querySelectorAll("#customerTabs .tab").forEach(t => t.classList.toggle("active", t.dataset.tab === "accounts"));
      await loadCustomerTab();
    }

    function getCustomerItems() {
      if (!customerData) return [];
      if (customerTab === "accounts") return customerData.accounts || [];
      if (customerTab === "sessions") return customerData.sessions || [];
      if (customerTab === "refposts") return customerData.reference_posts || [];
      if (customerTab === "presets") return customerData.presets || [];
      return [];
    }

    function renderCustomerItems() {
      const pane = $("customerListPane");
      $("customerPanelBody").classList.remove("analytics-mode");
      if (customerTab === "activity") {
        pane.innerHTML = "";
        $("customerDetailPane").innerHTML = `
          <div class="detail-title">最近行为</div>
          <table class="data-table">
            <thead><tr><th>时间</th><th>事件</th><th>备注</th></tr></thead>
            <tbody>${(customerData.recent_events || []).map(e => `<tr>
              <td>${fmtTime(e.created_at)}</td><td>${escapeHtml(e.event_type)}</td><td>${escapeHtml(JSON.stringify(e.meta || {}))}</td>
            </tr>`).join("") || '<tr><td colspan="3">暂无</td></tr>'}</tbody>
          </table>`;
        return;
      }

      const items = getCustomerItems();
      if (!items.length) {
        pane.innerHTML = '<div class="empty">该客户暂无此类数据</div>';
        $("customerDetailPane").innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }

      let html = "";
      if (customerTab === "accounts") {
        html = items.map(a => `<div class="list-item ${selectedItemId === a.id ? "active" : ""}" data-id="${a.id}">
          <strong>${escapeHtml(a.nickname || a.user_id)}</strong><span>粉丝 ${a.follower_count || 0} · 笔记 ${a.note_count || 0} · ${fmtTime(a.updated_at)}</span></div>`).join("");
      } else if (customerTab === "sessions") {
        html = items.map(s => `<div class="list-item ${selectedItemId === s.session_id ? "active" : ""}" data-id="${escapeHtml(s.session_id)}">
          <strong>${escapeHtml(s.title)}</strong><span>${s.message_count} 条 · ${fmtTime(s.updated_at)}</span></div>`).join("");
      } else if (customerTab === "refposts") {
        html = items.map(r => `<div class="list-item ${selectedItemId === r.id ? "active" : ""}" data-id="${r.id}">
          <strong>${escapeHtml(r.title || "未命名")}</strong><span>赞 ${r.liked_count || 0} · ${escapeHtml(r.author_nickname || "")}</span></div>`).join("");
      } else if (customerTab === "presets") {
        html = items.map(p => `<div class="list-item ${selectedItemId === p.id ? "active" : ""}" data-id="${p.id}">
          <strong>${escapeHtml(p.name)}</strong><span>${fmtTime(p.updated_at)}</span></div>`).join("");
      }
      pane.innerHTML = html;
      pane.querySelectorAll(".list-item").forEach(item => {
        item.onclick = () => {
          selectedItemId = customerTab === "sessions" ? item.dataset.id : Number(item.dataset.id);
          renderCustomerItems();
          loadCustomerDetail();
        };
      });
      $("customerDetailPane").innerHTML = '<div class="empty">选择一条记录查看详情</div>';
    }

    async function loadCustomerDetail() {
      if (selectedItemId == null) return;
      const pane = $("customerDetailPane");
      pane.innerHTML = '<div class="empty">加载中…</div>';
      if (customerTab === "accounts") {
        const d = await api(`/accounts/${selectedItemId}`);
        const sp = d.style_profile || {};
        pane.innerHTML = `
          <div class="detail-title">${escapeHtml(d.nickname)}</div>
          <div class="detail-meta">粉丝 ${d.follower_count || 0} · 笔记 ${d.note_count || 0}</div>
          <div class="detail-block"><h3>风格摘要</h3><pre>${escapeHtml(sp.summary || "—")}</pre></div>
          <div class="detail-block"><h3>高赞笔记</h3>
            ${(d.notes || []).map(n => `<div class="note-row"><strong>${escapeHtml(n.title || "无标题")}</strong> · 赞 ${n.liked_count || 0}
              <div style="color:var(--muted);margin-top:4px">${escapeHtml((n.content || "").slice(0, 120))}</div></div>`).join("") || "无"}
          </div>`;
      } else if (customerTab === "sessions") {
        const d = await api(`/sessions/${encodeURIComponent(selectedItemId)}`);
        pane.innerHTML = `
          <div class="detail-title">${escapeHtml(d.title || "对话")}</div>
          <div class="detail-block"><h3>消息记录</h3>
            ${(d.messages || []).map(m => `<div class="msg ${m.role === "user" ? "user" : "assistant"}">
              <strong>${m.role === "user" ? "用户" : "AI"}</strong>
              <div style="margin-top:6px;white-space:pre-wrap">${escapeHtml(m.content)}</div>
            </div>`).join("") || "无"}
          </div>`;
      } else if (customerTab === "refposts") {
        const d = await api(`/reference-posts/${selectedItemId}`);
        pane.innerHTML = `
          <div class="detail-title">${escapeHtml(d.title)}</div>
          <div class="detail-block"><h3>正文</h3><pre>${escapeHtml(d.content || d.content_preview || "—")}</pre></div>
          <div class="detail-block"><h3>风格分析</h3><pre>${escapeHtml(JSON.stringify(d.style_analysis || {}, null, 2))}</pre></div>`;
      } else if (customerTab === "presets") {
        const p = getCustomerItems().find(x => x.id === selectedItemId);
        pane.innerHTML = `
          <div class="detail-title">${escapeHtml(p.name)}</div>
          <div class="detail-block"><h3>产品 / 服务</h3><pre>${escapeHtml(p.product_desc || "—")}</pre></div>
          <div class="detail-block"><h3>目标人群</h3><pre>${escapeHtml(p.audience_desc || "—")}</pre></div>
          <div class="detail-block"><h3>补充说明</h3><pre>${escapeHtml(p.extra_notes || "—")}</pre></div>`;
      }
    }

    async function loadCustomerTab() {
      selectedItemId = null;
      const labels = { accounts: "对标账号", sessions: "对话记录", refposts: "参考帖", presets: "产品档案", activity: "最近行为" };
      $("customerToolbar").textContent = `该客户的${labels[customerTab] || "数据"}`;
      renderCustomerItems();
    }

    async function refreshAll() {
      $("refreshBtn").disabled = true;
      showError("");
      try {
        await loadHealth();
        await loadStats();
        if ($("customerPanel").classList.contains("hidden")) {
          await loadMainTab();
        } else if (selectedCustomerId) {
          await openCustomer(selectedCustomerId);
        }
      } catch (e) {
        if (e.message !== "未授权") showError("加载失败：" + e.message);
      } finally {
        $("refreshBtn").disabled = false;
      }
    }

    $("loginBtn").onclick = async () => {
      const token = $("tokenInput").value.trim();
      if (!token) { $("loginError").textContent = "请输入管理员口令"; return; }
      $("loginBtn").disabled = true;
      try {
        setToken(token);
        await api("/verify");
        showApp();
        await refreshAll();
      } catch (e) {
        setToken("");
        $("loginError").textContent = e.message || "登录失败";
      } finally {
        $("loginBtn").disabled = false;
      }
    };

    $("tokenInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("loginBtn").click(); });
    $("logoutBtn").onclick = () => { setToken(""); $("tokenInput").value = ""; showLogin(); };
    $("mainTabs").onclick = (e) => {
      const tab = e.target.closest(".tab");
      if (!tab) return;
      document.querySelectorAll("#mainTabs .tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      mainTab = tab.dataset.tab;
      loadMainTab();
    };
    $("customerTabs").onclick = (e) => {
      const tab = e.target.closest(".tab");
      if (!tab) return;
      document.querySelectorAll("#customerTabs .tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      customerTab = tab.dataset.tab;
      loadCustomerTab();
    };
    $("backToCustomers").onclick = () => {
      selectedCustomerId = null;
      customerData = null;
      mainTab = "customers";
      document.querySelectorAll("#mainTabs .tab").forEach(t => t.classList.toggle("active", t.dataset.tab === "customers"));
      loadMainTab();
    };
    $("refreshBtn").onclick = refreshAll;

    (async () => {
      const saved = getToken();
      if (!saved) { showLogin(); return; }
      try {
        setToken(saved);
        await api("/verify");
        showApp();
        await refreshAll();
      } catch {
        showLogin();
      }
    })();
  </script>
</body>
</html>
